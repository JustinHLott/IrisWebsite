<!DOCTYPE html>
<html lang="en">
<head>
    <title>Iris Website: Login</title>
    <meta charset="UTF-8"  name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="iris.css?v=5.6">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Platypi:ital,wght@0,300..800;1,300..800&display=swap');
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1 class="platypi-justin theHeader">Our Iris Gardens</h1>
        </header>
        <nav>
            <a href="portfolio.html">Back to Portfolio</a>&nbsp;
        </nav>
        <main>
            <div id="gallery2">
                <div id="about">
                  <div id="divLogInOrCreate" style="display: block">
                    <input type="button" id="chooseNewUser" value="Create New User" style="margin-top: 20px" class="fontSize1em">
                    <div id="createUserDiv" style="display: none">
                      <form action="">
                        <H3 class="platypi-justin"><strong>Create New User</strong></H3>
                        <label for="emailAddressCreate" class="no-wrap">Enter email address:</label><br>
                        <input type="text" id="emailAddressCreate" class="fontSize1em"><br>
                        <label for="userPasswordCreate" class="no-wrap">Enter password:</label><br>
                        <input type="password" id="userPasswordCreate" class="fontSize1em"><br>
                        <label for="userPasswordCreate2" class="no-wrap">Enter password again:</label><br>
                        <input type="password" id="userPasswordCreate2" class="fontSize1em"><br>
                        <input type="button" value="Create User" id="createUser" class="fontSize1em">
                      </form>
                    </div>
                    <div id="logInDiv" style="display: block">
                      <form action="">
                        <H3 class="platypi-justin"><strong>Log in</strong></H3>
                        <label for="emailAddress" class="no-wrap">Enter email address:</label>
                        <input type="text" id="emailAddress" class="fontSize1em"><br><br>
                        <label for="userPassword" class="no-wrap">Enter password:</label>
                        <input type="password" id="userPassword" class="fontSize1em"><br><br>
                        <input type="button" id="logIn" value="Log In" class="fontSize1em">
                      </form>
                    </div>
                  </div>
                    
                    
                    <button id="logoutBtn" class="fontSize1em" style="display: block; margin-top: 20px">Log Out</button>
                    <br>
                    <a href="comments.html">
                      <button class="fontSize1em">To Comments</button>
                    </a>

                    <p id="status">cat</p><br>

  
                </div>

                <br class="clear-it">
            </div>
            <div id ="contact" class="centered">
                Iris Website<br>
                Kaysville, UT 84037<br>
                <br>
                <a href="tel:385-306-9320">(385) 306-9320</a> <br>
                <br>
            </div>
        </main>
        <footer class="centered">
            <small><i>
                Copyright &copy; Iris Website<br>
                <a href="mailto:info@IrisWebsite.com">info@IrisWebsite.com</a>
            </i></small>
        </footer>
    </div>
    <script src="dist/js/lightbox-plus-jquery.min.js"></script>
    <script type="module" src="dist/js/firebaseLink.js"></script>
</body>
</html>
