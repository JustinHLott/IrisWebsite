    <script type="module">
        import { getAuth } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
        import { app } from "./dist/js/firebaseAuth.js"; // your initializeApp(firebaseConfig)

        const auth = getAuth(app);
        const commentsBtn = document.getElementById("commentsHtml");
        const logOutBtn = document.getElementById("logOutPortfolio");

        commentsBtn.addEventListener("click", () => {
            const user = auth.currentUser;
            if (user) {
                // ✅ Logged in → go to comments
                window.location.href = "comments.html";
            } else {
                // ❌ Not logged in → go to login
                window.location.href = "login.html";
            }
        });
        logOutBtn.addEventListener("click", () => {
            window.location.href = "login.html";
        });
    </script>
